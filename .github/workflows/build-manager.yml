name: Build Manager

on:
  push:
    branches: [ "main", "dev", "ci", "master", "xxksu" ]
    paths:
      - 'README.md'
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - '.github/workflows/ksud-extra.yml'
      - '.github/scripts/setup-rust-build.sh'
      - 'repack_apk.py'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
      - 'scripts/ksubot.py'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - '.github/workflows/ksud-extra.yml'
      - '.github/scripts/setup-rust-build.sh'
      - 'repack_apk.py'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
      - 'scripts/ksubot.py'
  workflow_call:
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-latest
    outputs:
      expected_size: ${{ steps.extract.outputs.expected_size }}
      expected_hash: ${{ steps.extract.outputs.expected_hash }}
      store_pass: ${{ steps.gen.outputs.store_pass }}
      key_alias: ${{ steps.gen.outputs.key_alias }}
      is_pr: ${{ steps.gen.outputs.is_pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Process keystore
        id: gen
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            STORE_PASS=$(openssl rand -hex 32)
            KEY_ALIAS="pr-key"

            keytool -genkeypair \
              -alias pr-key \
              -keyalg RSA -keysize 2048 \
              -validity 1 \
              -storepass "$STORE_PASS" \
              -keypass "$STORE_PASS" \
              -dname "CN=KernelSU PR Build" \
              -storetype JKS \
              -keystore target-key.jks

            echo "is_pr=true" >> $GITHUB_OUTPUT
          else
            STORE_PASS="password"
            KEY_ALIAS="alias"

            curl -Lo target-key.jks https://github.com/yapixel/KernelSU/raw/refs/heads/master/manager/dummy.keystore

            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi

          echo "store_pass=$STORE_PASS" >> $GITHUB_OUTPUT
          echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT

      - name: Extract certificate hash and size
        id: extract
        run: |
          keytool -exportcert \
            -alias "${{ steps.gen.outputs.key_alias }}" \
            -keystore target-key.jks \
            -storepass "${{ steps.gen.outputs.store_pass }}" \
            -file pr-cert.der

          SIZE_DEC=$(stat -c%s pr-cert.der)
          SIZE_HEX=$(printf '0x%04x' "$SIZE_DEC")
          echo "expected_size=$SIZE_HEX" >> $GITHUB_OUTPUT

          HASH=$(sha256sum pr-cert.der | awk '{print $1}')
          echo "expected_hash=$HASH" >> $GITHUB_OUTPUT

          echo "Certificate size: $SIZE_HEX ($SIZE_DEC bytes)"
          echo "Certificate hash: $HASH"

      - name: Upload temporary key
        uses: actions/upload-artifact@v7
        with:
          name: runtime-key
          path: target-key.jks

  build-lkm:
    needs: generate-key
    uses: ./.github/workflows/build-lkm.yml
    with:
      expected_size2: ${{ needs.generate-key.outputs.expected_size }}
      expected_hash2: ${{ needs.generate-key.outputs.expected_hash }}
    secrets: inherit

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
          - target: armv7-linux-androideabi
          - target: x86_64-linux-android
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      pack_lkm: true
      pack_ksuinit: true

  build-ksud-extra:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
    uses: ./.github/workflows/ksud-extra.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}
      pack_lkm: true
      pack_ksuinit: true

  build-manager:
    needs: [generate-key]
    if: always() && needs.generate-key.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./manager
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Hijack Git Command for Dynamic Versioning
        run: |
          cd "$GITHUB_WORKSPACE"

          /usr/bin/git remote add upstream https://github.com/KOWX712/KernelSU.git 2>/dev/null || \
          /usr/bin/git remote set-url upstream https://github.com/KOWX712/KernelSU.git

          /usr/bin/git fetch upstream master:refs/remotes/upstream/master --tags

          UPSTREAM_BRANCH="upstream/master"

          REAL_COUNT=$(/usr/bin/git rev-list --count HEAD 2>/dev/null || echo 0)
          UPSTREAM_COUNT=$(/usr/bin/git rev-list --count "$UPSTREAM_BRANCH" 2>/dev/null || echo 0)
          REAL_DESC=$(/usr/bin/git describe --tags --always HEAD 2>/dev/null || echo unknown)
          UPSTREAM_DESC=$(/usr/bin/git describe --tags --always "$UPSTREAM_BRANCH" 2>/dev/null || echo unknown)
          LOCAL_OFFSET=$(/usr/bin/git rev-list --count "$UPSTREAM_BRANCH"..HEAD 2>/dev/null || echo 0)

          echo "Compare branch: $UPSTREAM_BRANCH"
          echo "Real HEAD count: $REAL_COUNT"
          echo "Upstream count: $UPSTREAM_COUNT"
          echo "Local commit offset: $LOCAL_OFFSET"
          echo "Real HEAD describe: $REAL_DESC"
          echo "Upstream describe: $UPSTREAM_DESC"
          echo "Local commits:"
          /usr/bin/git log --oneline "$UPSTREAM_BRANCH"..HEAD || true

          mkdir -p "$HOME/bin"

          cat > "$HOME/bin/git" << EOF
          #!/bin/bash
          UPSTREAM_BRANCH="upstream/master"

          if [[ "\$*" == *"rev-list --count"* ]]; then
              /usr/bin/git rev-list --count "\$UPSTREAM_BRANCH"
          elif [[ "\$*" == *"describe"* ]]; then
              /usr/bin/git describe --tags --always "\$UPSTREAM_BRANCH"
          else
              exec /usr/bin/git "\$@"
          fi
          EOF

          chmod +x "$HOME/bin/git"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Download Runtime Key
        uses: actions/download-artifact@v8
        with:
          name: runtime-key
          path: manager/

      - name: Write key config to gradle
        run: |
          if [ "${{ needs.generate-key.outputs.is_pr }}" = "true" ]; then
            mv target-key.jks pr-key.jks
            {
              echo KEYSTORE_PASSWORD='${{ needs.generate-key.outputs.store_pass }}'
              echo KEY_ALIAS='${{ needs.generate-key.outputs.key_alias }}'
              echo KEY_PASSWORD='${{ needs.generate-key.outputs.store_pass }}'
              echo KEYSTORE_FILE='pr-key.jks'
            } >> gradle.properties
          else
            mv target-key.jks dummy.keystore
            {
              echo KEYSTORE_PASSWORD='password'
              echo KEY_ALIAS='alias'
              echo KEY_PASSWORD='password'
              echo KEYSTORE_FILE='dummy.keystore'
            } >> gradle.properties
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build with Gradle
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew assembleRelease -PIS_PR_BUILD=true
          else
            ./gradlew assembleRelease
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: manager-gradle
          path: manager/app/build/outputs/apk/release/*.apk

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        if: ${{ ( github.event_name != 'pull_request') || github.ref_type == 'tag' }}
        with:
          name: "mappings"
          path: "manager/app/build/outputs/mapping/release/"

  repack-manager:
    needs: [build-manager, build-ksud, generate-key]
    if: always() && needs.build-manager.result == 'success' && needs.build-ksud.result == 'success' && needs.generate-key.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Hijack Git Command for Dynamic Repack
        run: |
          /usr/bin/git remote add upstream https://github.com/KOWX712/KernelSU.git 2>/dev/null || \
          /usr/bin/git remote set-url upstream https://github.com/KOWX712/KernelSU.git

          /usr/bin/git fetch upstream master:refs/remotes/upstream/master --tags

          UPSTREAM_BRANCH="upstream/master"

          REAL_COUNT=$(/usr/bin/git rev-list --count HEAD 2>/dev/null || echo 0)
          UPSTREAM_COUNT=$(/usr/bin/git rev-list --count "$UPSTREAM_BRANCH" 2>/dev/null || echo 0)
          REAL_DESC=$(/usr/bin/git describe --tags --always HEAD 2>/dev/null || echo unknown)
          UPSTREAM_DESC=$(/usr/bin/git describe --tags --always "$UPSTREAM_BRANCH" 2>/dev/null || echo unknown)
          LOCAL_OFFSET=$(/usr/bin/git rev-list --count "$UPSTREAM_BRANCH"..HEAD 2>/dev/null || echo 0)

          echo "Compare branch: $UPSTREAM_BRANCH"
          echo "Real HEAD count: $REAL_COUNT"
          echo "Upstream count: $UPSTREAM_COUNT"
          echo "Local commit offset: $LOCAL_OFFSET"
          echo "Real HEAD describe: $REAL_DESC"
          echo "Upstream describe: $UPSTREAM_DESC"
          echo "Local commits:"
          /usr/bin/git log --oneline "$UPSTREAM_BRANCH"..HEAD || true

          mkdir -p "$HOME/bin"

          cat > "$HOME/bin/git" << EOF
          #!/bin/bash
          UPSTREAM_BRANCH="upstream/master"

          if [[ "\$*" == *"rev-list --count"* ]]; then
              /usr/bin/git rev-list --count "\$UPSTREAM_BRANCH"
          elif [[ "\$*" == *"describe"* ]]; then
              /usr/bin/git describe --tags --always "\$UPSTREAM_BRANCH"
          else
              exec /usr/bin/git "\$@"
          fi
          EOF

          chmod +x "$HOME/bin/git"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Download gradle manager artifact
        uses: actions/download-artifact@v8
        with:
          name: manager-gradle
          path: artifacts/manager-gradle

      - name: Download arm64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-aarch64-linux-android
          path: artifacts/ksud-aarch64-linux-android

      - name: Download arm ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-armv7-linux-androideabi
          path: artifacts/ksud-armv7-linux-androideabi

      - name: Download Runtime Key
        uses: actions/download-artifact@v8
        with:
          name: runtime-key
          path: manager/

      - name: Place manager apk and ksud artifacts
        run: |
          mkdir -p manager/app/build/outputs/apk/release

          APK=$(find artifacts/manager-gradle -type f -name "*.apk" | head -n 1)
          test -n "$APK"
          cp -f "$APK" manager/app/build/outputs/apk/release/

          mkdir -p target/aarch64-linux-android/release
          mkdir -p target/armv7-linux-androideabi/release

          ARM64_KSUD=$(find artifacts/ksud-aarch64-linux-android -type f -name ksud | head -n 1)
          ARM_KSUD=$(find artifacts/ksud-armv7-linux-androideabi -type f -name ksud | head -n 1)

          test -n "$ARM64_KSUD"
          test -n "$ARM_KSUD"

          cp -f "$ARM64_KSUD" target/aarch64-linux-android/release/ksud
          cp -f "$ARM_KSUD" target/armv7-linux-androideabi/release/ksud

      - name: Prepare signing inputs
        run: |
          if [ "${{ needs.generate-key.outputs.is_pr }}" = "true" ]; then
            echo "::error::PR event should not repack with global variables"
            exit 1
          else
            mv manager/target-key.jks manager/dummy.keystore
            echo "SIGN_KEYSTORE_FILE=manager/dummy.keystore" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=alias" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=password" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=password" >> $GITHUB_ENV
          fi

      - name: Repack and resign
        if: ${{ ( github.event_name != 'pull_request' ) || github.ref_type == 'tag' }}
        run: |
          python3 repack_apk.py repack \
            -b release \
            -t release \
            -a arm64-v8a \
            -a armeabi-v7a \
            -K "$SIGN_KEYSTORE_FILE" \
            -A "$SIGN_KEY_ALIAS" \
            -P "$SIGN_KEYSTORE_PASSWORD" \
            -S "$SIGN_KEY_PASSWORD" \
            --strip

      - name: Upload build artifact
        if: ${{ ( github.event_name != 'pull_request' ) || github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v7
        with:
          name: manager
          path: dist/*.apk

      - name: Bot session cache
        if: github.event_name != 'pull_request' && steps.need_upload.outputs.UPLOAD == 'true'
        id: bot_session_cache
        uses: actions/cache@v6
        with:
          path: scripts/ksubot.session
          key: ${{ runner.os }}-bot-session

      - name: Upload to telegram
        if: github.event_name != 'pull_request' && steps.need_upload.outputs.UPLOAD == 'true'
        env:
          CHAT_ID: ${{ vars.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ vars.MESSAGE_THREAD_ID }}
          GITHUB_EVENT: ${{ toJson(github.event) }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: Manager
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            export VERSION=$(git rev-list --count HEAD)
            APK=$(find ./dist -name "*.apk")
            pip3 install telethon
            python3 $GITHUB_WORKSPACE/scripts/ksubot.py $APK
          fi
