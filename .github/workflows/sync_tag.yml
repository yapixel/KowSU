name: Sync Upstream Tags

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch tags
        run: |
          git remote add upstream https://github.com/KOWX712/KernelSU.git
          git fetch upstream --tags

      - name: Sync tags
        run: |
          NEW_TAGS=$(git tag | grep -Fv -f <(git ls-remote --tags origin | awk '{print $2}' | sed 's|refs/tags/||' | grep -v '\^{}'))
          
          if [ -z "$NEW_TAGS" ]; then
            echo "No new tags to sync."
            exit 0
          fi

          for TAG in $NEW_TAGS; do
            echo "Processing tag: $TAG"
            git push origin "$TAG"
          done
