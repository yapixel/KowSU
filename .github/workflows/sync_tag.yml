name: Sync Upstream Tags

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch tags
        run: |
          git remote add upstream https://github.com/KOWX712/KernelSU.git
          git fetch upstream --tags

      - name: Sync tags via safe merge history
        run: |
          NEW_TAGS=$(git tag | grep -Fv -f <(git ls-remote --tags origin | awk '{print $2}' | sed 's|refs/tags/||' | grep -v '\^{}'))
          
          if [ -z "$NEW_TAGS" ]; then
            echo "No new tags to sync."
            exit 0
          fi

          # 记录当前所在的分支名（通常是 main 或 master）
          CURRENT_BRANCH=$(git branch --show-current)

          for TAG in $NEW_TAGS; do
            echo "Processing tag: $TAG"
            
            # 创建一个临时分支用于合并
            git checkout -b "sync-merge-$TAG"
            
            # 允许合并不相关的历史流程，把上游该 Tag 强行合并进来
            # 这会产生一个合法的 Merge commit，让 GitHub 允许通过工作流校验
            if git merge "$TAG" --allow-unrelated-histories -m "Merge tag $TAG for syncing"; then
              # 推送合并后的临时分支，这样对应的 Commit 就会合法进入你的远端仓库
              git push origin "sync-merge-$TAG"
              
              # 此时 Commit 已经在远端合法存在了，直接推送原生的 Tag 即可成功
              git push origin "$TAG"
            else
              echo "Failed to merge $TAG step."
            fi

            # 清理远端和本地的临时分支
            git push origin --delete "sync-merge-$TAG" 2>/dev/null || true
            git checkout "$CURRENT_BRANCH"
            git branch -D "sync-merge-$TAG"
          done
